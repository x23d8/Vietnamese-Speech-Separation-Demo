# Generated 2026-03-17 from:
# /kaggle/working/speechbrain/recipes/WSJ0Mix/separation/hparams/sepformer-customdataset.yaml
# yamllint disable
# ################################
# Model: SepFormer for source separation
# https://arxiv.org/abs/2010.13154
# Dataset : Custom dataset
# ################################
#
# Basic parameters
# Seed needs to be set at top of yaml, before objects with parameters are made
#
seed: 42
__set_seed: !apply:speechbrain.utils.seed_everything [42]

# Data params

# e.g. '/yourpath/wsj0-mix/2speakers'
# end with 2speakers for wsj0-2mix or 3speakers for wsj0-3mix
data_folder: /kaggle/input/datasets/lymihu/duc-mixed-aduio-2source/datasets

# the path for wsj0/si_tr_s/ folder -- only needed if dynamic mixing is used
# e.g. /yourpath/wsj0-processed/si_tr_s/
# you need to convert the original wsj0 to 8k
# you can do this conversion with the script ../meta/preprocess_dynamic_mixing.py
base_folder_dm: /yourpath/wsj0-processed/si_tr_s/

experiment_name: sepformer-custom
output_folder: results/sepformer-custom/42
train_log: results/sepformer-custom/42/train_log.txt
save_folder: results/sepformer-custom/42/save
train_data: results/sepformer-custom/42/save/custom_train.csv
valid_data: results/sepformer-custom/42/save/custom_valid.csv
test_data: results/sepformer-custom/42/save/custom_test.csv
skip_prep: false

pretrained_separator: !new:speechbrain.utils.parameter_transfer.Pretrainer
  collect_in: results/sepformer-custom/42/save
  loadables:
    encoder: &id002 !new:speechbrain.lobes.models.dual_path.Encoder
      kernel_size: 16
      out_channels: 256


    decoder: &id006 !new:speechbrain.lobes.models.dual_path.Decoder
      in_channels: 256
      out_channels: 1
      kernel_size: 16
      stride: 8
      bias: false

    masknet: &id005 !new:speechbrain.lobes.models.dual_path.Dual_Path_Model

      num_spks: 2
      in_channels: 256
      out_channels: 256
      num_layers: 1
      K: 250
      intra_model: &id003 !new:speechbrain.lobes.models.dual_path.SBTransformerBlock
        num_layers: 4
        d_model: 256
        nhead: 8
        d_ffn: 1024
        dropout: 0
        use_positional_encoding: true
        norm_before: true

      inter_model: &id004 !new:speechbrain.lobes.models.dual_path.SBTransformerBlock
        num_layers: 4
        d_model: 256
        nhead: 8
        d_ffn: 1024
        dropout: 0
        use_positional_encoding: true
        norm_before: true

      norm: ln
      linear_layer_after_inter_intra: false
      skip_around_intra: true

  paths:
    encoder: speechbrain/sepformer-wsj02mix/encoder.ckpt
    decoder: speechbrain/sepformer-wsj02mix/decoder.ckpt
    masknet: speechbrain/sepformer-wsj02mix/masknet.ckpt

# Experiment params
precision: fp32 # bf16, fp16 or fp32
num_spks: 2 # set to 3 for wsj0-3mix
noprogressbar: false
save_audio: true # Save estimated sources on disk
sample_rate: 16000

####################### Training Parameters ####################################
N_epochs: 100
batch_size: 1
lr: 0.0003
clip_grad_norm: 5
loss_upper_lim: 999999  # this is the upper limit for an acceptable loss
# if True, the training sequences are cut to a specified length
limit_training_signal_len: false
# this is the length of sequences if we choose to limit
# the signal length of training sequences
training_signal_len: 32000

# Set it to True to dynamically create mixtures at training time
dynamic_mixing: false

# Parameters for data augmentation
use_wavedrop: false
use_speedperturb: false
use_rand_shift: false
min_shift: -8000
max_shift: 8000

# Speed perturbation
speed_changes: &id001 [95, 100, 105]

# Frequency drop: randomly drops a number of frequency bands to zero.
speed_perturb: !new:speechbrain.augment.time_domain.SpeedPerturb
  orig_freq: 16000
  speeds: *id001
drop_freq_low: 0  # Min frequency band dropout probability
drop_freq_high: 1  # Max frequency band dropout probability
drop_freq_count_low: 1  # Min number of frequency bands to drop
drop_freq_count_high: 3  # Max number of frequency bands to drop
drop_freq_width: 0.05  # Width of frequency bands to drop

drop_freq: !new:speechbrain.augment.time_domain.DropFreq
  drop_freq_low: 0
  drop_freq_high: 1
  drop_freq_count_low: 1
  drop_freq_count_high: 3
  drop_freq_width: 0.05

# Time drop: randomly drops a number of temporal chunks.
drop_chunk_count_low: 1  # Min number of audio chunks to drop
drop_chunk_count_high: 5  # Max number of audio chunks to drop
drop_chunk_length_low: 1000  # Min length of audio chunks to drop
drop_chunk_length_high: 2000  # Max length of audio chunks to drop

drop_chunk: !new:speechbrain.augment.time_domain.DropChunk
  drop_length_low: 1000
  drop_length_high: 2000
  drop_count_low: 1
  drop_count_high: 5

# loss thresholding -- this thresholds the training loss
threshold_byloss: true
threshold: -30

# Encoder parameters
N_encoder_out: 256
out_channels: 256
kernel_size: 16
kernel_stride: 8

# Dataloader options
# Set num_workers: 0 on Windows/MacOS due to behavior of the multiprocessing library
dataloader_opts:
  batch_size: 1
  num_workers: 0


# Specifying the network
Encoder: *id002
SBtfintra: *id003
SBtfinter: *id004
MaskNet: *id005
Decoder: *id006
optimizer: !name:torch.optim.Adam
  lr: 0.0003
  weight_decay: 0

loss: !name:speechbrain.nnet.losses.get_si_snr_with_pitwrapper

lr_scheduler: &id008 !new:speechbrain.nnet.schedulers.ReduceLROnPlateau

  factor: 0.5
  patience: 2
  dont_halve_until_epoch: 30

epoch_counter: &id007 !new:speechbrain.utils.epoch_loop.EpochCounter
  limit: 100

modules:
  encoder: *id002
  decoder: *id006
  masknet: *id005
checkpointer: !new:speechbrain.utils.checkpoints.Checkpointer
  checkpoints_dir: results/sepformer-custom/42/save
  recoverables:
    encoder: *id002
    decoder: *id006
    masknet: *id005
    counter: *id007
    lr_scheduler: *id008
train_logger: !new:speechbrain.utils.train_logger.FileTrainLogger
  save_file: results/sepformer-custom/42/train_log.txt
